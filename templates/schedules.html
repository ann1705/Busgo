{% extends "base.html" %}
{% block content %}

<div class="schedule-main">
    <div class="schedule-container">
        <h1 class="schedule-title">Available Buses</h1>

        <table class="bus-table">
            <thead>
                <tr>
                    <th>Bus No</th>
                    <th>Route</th>
                    <th>Departure</th>
                    <th>Arrival</th>
                    <th>Price</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                {% for bus in buses %}
                <tr>
                    <td>{{ bus.bus_no }}</td>
                    <td>{{ bus.route }}</td>
                    <td>{{ bus.departure }}</td>
                    <td>{{ bus.arrival }}</td>
                    <td>₱{{ bus.price }}</td>
                    <td>
                        <a href="{{ url_for('booking', bus_id=bus.id) }}" 
                           class="book-now-btn">
                            Book Now
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

{% endblock %}
