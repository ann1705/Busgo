{% extends "base.html" %}

{% block title %}BusGo | Available Schedules{% endblock %}

{% block content %}
<main class="schedule-main">
    <div class="schedule-container">
        <h1 class="schedule-title">Bus Schedules</h1>
        
        <div class="filter-row">
            <div class="search-box">
                <input type="text" id="scheduleSearch" placeholder="Search destination..." onkeyup="filterSchedules()">
                <i class="fa-solid fa-magnifying-glass"></i>
            </div>
        </div>

        <table class="bus-table" id="busTable">
            <thead>
                <tr>
                    <th>Bus No.</th>
                    <th>Route</th>
                    <th>Departure</th>
                    <th>Arrival</th>
                    <th>Price</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>EXP-001</td>
                    <td>Cebu City → Lapu-Lapu</td>
                    <td>08:00 AM</td>
                    <td>09:30 AM</td>
                    <td>₱150.00</td>
                    <td><button class="book-now-btn" onclick="window.location.href='/booking'">Book Now</button></td>
                </tr>
                </tbody>
        </table>
    </div>
</main>
{% endblock %}
