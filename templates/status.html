{% extends "base.html" %}
{% block title %}BusGo | Ticket Status{% endblock %}

{% block content %}
<main class="schedule-main">
    <div class="schedule-container glass-booking-card">
        <h1 class="schedule-title">Your Ticket Details</h1>

        <section class="status-selection-wrapper">
            <div class="bus-grid-header">
                <span>Ticket ID: BG{{ booking.id }}</span>
            </div>

            <div class="status-content-padding">

                <div class="booking-input-group">
                    <label>Passenger Name:</label>
                    <span class="status-value">{{ booking.passenger_name }}</span>
                </div>

                <div class="booking-input-group">
                    <label>Contact:</label>
                    <span class="status-value">{{ booking.contact }}</span>
                </div>

                <div class="booking-input-group">
                    <label>Route:</label>
                    <span class="status-value">{{ booking.route }}</span>
                </div>

                <div class="booking-input-group">
                    <label>Status:</label>
                    <span class="status-value">
                        {{ booking.status.capitalize() }}
                    </span>
                </div>

                <div class="booking-input-group" style="border-bottom:none;">
                    <label>Total Fare:</label>
                    <span class="status-value">₱{{ booking.price }}</span>
                </div>

            </div>
        </section>

        <div class="action-footer">
            <button onclick="window.print()" class="print-btn">
                Print Ticket
            </button>
        </div>

    </div>
</main>
{% endblock %}
