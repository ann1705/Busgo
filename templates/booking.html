{% extends "base.html" %}

{% block title %}BusGo | Seat Selection{% endblock %}

{% block content %}
<main class="schedule-main">
    <div class="schedule-container glass-booking-card">
        <h1 class="schedule-title">Ticket Booking</h1>

        <section class="booking-glass-section">
            <div class="booking-input-group">
                <label>Passenger Name:</label>
                <input type="text" id="passName" placeholder="Enter Full Name">
            </div>
            <div class="booking-input-group">
                <label>Contact Number:</label>
                <input type="text" id="passContact" placeholder="Enter Phone Number">
            </div>
        </section>

        <h3 class="selection-subtitle">Selected Bus: EXP-001</h3>
        
        <section class="seat-selection-wrapper">
            <div class="bus-grid-header">
                <span>Select Your Seat</span>
            </div>
            <div class="seat-grid" id="seatGrid">
                </div>
        </section>

        <div class="action-footer">
            <button class="confirm-booking-btn" onclick="confirmFinalBooking()">Confirm Booking</button>
        </div>
    </div>
</main>

<script>
    // Local script to generate the 4x4 grid specifically for this page
    const grid = document.getElementById('seatGrid');
    if (grid) {
        for (let i = 1; i <= 16; i++) {
            const seat = document.createElement('div');
            seat.className = 'seat-box';
            seat.onclick = function() { this.classList.toggle('selected'); };
            grid.appendChild(seat);
        }
    }
    }
</script>
{% endblock %}
